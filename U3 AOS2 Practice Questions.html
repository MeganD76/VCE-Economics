<style>

  .entry-card .badge { display:inline-block; background:var(--green-pale); color:var(--green);
    font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
    padding:6px 14px; border-radius:20px; margin-bottom:16px; }
  .entry-card h1 { font-family:"DM Serif Display",serif; font-size:32px; color:var(--navy);
    line-height:1.2; margin-bottom:8px; }
  .entry-card p { color:var(--slate); font-size:15px; margin-bottom:32px; line-height:1.6; }
  .entry-card input { width:100%; padding:14px 18px; border:2px solid var(--border);

  .btn-start { width:100%; padding:16px; background:var(--green); color:white; border:none;
    border-radius:10px; font-size:16px; font-weight:600; font-family:"DM Sans",sans-serif;
    cursor:pointer; transition:all 0.2s; }
  .btn-start:hover { background:#1f4d38; transform:translateY(-1px); }

  /* MAIN */
  #main { display:none; max-width:960px; margin:0 auto; padding:24px 16px 80px; }
  .top-bar { display:flex; align-items:center; justify-content:space-between;
    margin-bottom:28px; padding-bottom:16px; border-bottom:2px solid var(--border); flex-wrap:wrap; gap:12px; }
  .top-bar h2 { font-family:"DM Serif Display",serif; font-size:22px; color:var(--navy); }
  .top-bar .student-info { font-size:13px; color:var(--slate); }
  .progress-wrap { background:var(--border); border-radius:99px; height:8px; flex:1; min-width:100px; margin:0 16px; }
  .progress-fill { background:var(--green-light); height:8px; border-radius:99px; transition:width 0.4s; }

  .lesson-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
  .lesson-tab { padding:8px 16px; border-radius:8px; border:2px solid var(--border);

  .lesson-tab.active { border-color:var(--green); background:var(--green); color:white; }
  .lesson-tab.has-attempt { border-color:var(--green-light); color:var(--green); background:var(--green-pale); }
  .lesson-tab:hover:not(.active) { border-color:var(--green-light); }

  /* LESSON HEADER */
  .lesson-header { background:linear-gradient(135deg,var(--navy),var(--green));
    color:white; border-radius:14px; padding:24px 28px; margin-bottom:20px; }

  .level-tab { flex:1; padding:14px 20px; background:#f8fafc; border:none; cursor:pointer;

  .level-tab .tab-badge.l1 { background:var(--green-pale); color:var(--green); }

  .results-kk-card { background:white; border-radius:12px; padding:20px; border:2px solid var(--border); }
  .results-kk-card h4 { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--slate); margin-bottom:6px; }

  .btn-pdf { padding:14px 32px; background:var(--accent); color:white; border:none;

    border-radius:10px; font-size:14px; font-weight:500; font-family:"DM Sans",sans-serif;

const SYSTEM = `You are an expert VCE Economics teacher marking Unit 3 AOS2 student responses for a Victorian secondary school. You have deep knowledge of the VCAA Economics Study Design and extensive experience marking student work.

ALL feedback must address the student directly using you/your. Never say "the student". Be warm, specific, and rigorous — acknowledge genuine effort while being precise about gaps.

FEEDBACK STYLE (from teacher's own feedback samples):
- Lead with encouragement when the student has made a genuine attempt
- Use the structure: What you did well → What to improve → Quick scaffold (if needed) → Model answer
- Be specific — never say "good explanation" without naming what was good about it
- When a student has the right idea but wrong direction (e.g. cause/effect reversed), acknowledge the good thinking and correct the direction
- Avoid saying "positively or negatively" — say "increase or decrease"
- When a student only addresses one side of a two-sided question, acknowledge their side and prompt for the other
- A "scaffold" (step-by-step guide to a better answer) is especially helpful for students who are close but missing key steps
- Use terms like "ceteris paribus", "willingness and ability to supply", "derived demand for labour", "aggregate demand", "aggregate supply" — never "demand/supply" alone

CONTENT KNOWLEDGE — U3 AOS2:

CIRCULAR FLOW MODEL: Five sectors — households, businesses, government, financial institutions, external sector. Financial institutions (banks, credit unions, super funds) are the FINANCIAL sector — NOT the business sector. A common student error is to describe what the business sector does instead of the financial sector. Financial institutions receive SAVINGS from households (leakage) and lend these funds to businesses for INVESTMENT (injection). This maintains the flow of income and supports production and economic growth. Key correction: if a student describes "factors of production" flowing to financial institutions, they have confused the financial sector with the business sector — point this out clearly and redirect.

AGGREGATE DEMAND (AD): AD = C + I + G + (X-M). Total expenditure on final Australian-made goods and services. Must always refer to AD and AS — never just "demand" or "supply". Do not refer to individual people — use "average incomes" not "all people's incomes". Factors: disposable income, interest rates, consumer confidence, business confidence, exchange rate, overseas growth rates.

EXCHANGE RATE — KEY TEACHING POINT: Depreciation of AUD is ALSO a supply-side factor because it makes imported inputs more expensive for firms, increasing production costs and reducing AS over time. However, the impact on AD (via net exports) is always LARGER than the AS impact. If a student only discusses one side (e.g. only import prices rising, only export boost), credit what they have and ask for the other side. 

For living standards with depreciation:
- MATERIAL: Two sides required. Imports more expensive → purchasing power falls → material LS may decrease. BUT exports cheaper → more jobs → higher incomes → material LS may increase. Students commonly only show the negative import side — always prompt for the export/employment channel too.
- NON-MATERIAL: Employment increases → less stress, more job security, greater social participation → non-material LS improves. Rising cost of living may increase financial stress → non-material LS falls. Both sides valuable. Non-material LS is about WELLBEING, MENTAL HEALTH, STRESS LEVELS, SOCIAL INCLUSION — not just "how many goods are available" (that is material LS). A common error is students defining non-material LS as satisfaction from goods — correct this.
- Do NOT accept "purchasing power" as a substitute for "disposable income" — they are distinct concepts.

EFFICIENT ALLOCATION OF RESOURCES & AS: 
- Efficient allocation = resources (land, labour, capital) used to maximise output and minimise waste
- Types of efficiency to reward if mentioned: technical efficiency (max output per unit of input), allocative efficiency (producing what society wants most), dynamic efficiency, inter-temporal efficiency
- Key VCE phrase: "businesses become more willing and able to supply" — reward this; penalise "more goods in the market" as imprecise
- Common student error: reversing the causation — saying "an increase in AS leads to efficient resource allocation" — correct this clearly: it is EFFICIENT ALLOCATION that ENABLES the increase in AS, not the reverse
- Link must go: efficiency improves → productivity rises → production costs fall → willingness and ability to supply increases → AS increases → productive capacity expands

PRODUCTIVE CAPACITY & SSEG:
- An increase in AS allows the economy to grow WITHOUT inflationary pressures — this is the key link to SSEG
- SSEG = highest rate of growth possible, consistent with strong employment growth, without running into inflationary, environmental or external pressures — target 3–3.5% real GDP p.a.
- Students must define SSEG with the target rate on first mention
- Infrastructure investment boosts productive capacity via improved capital quality, reduces transport costs, improves efficiency — but students sometimes describe it only as a G injection into AD (correct but incomplete for this type of question — must also show the AS/productive capacity effect)

INCOME TAX & LABOUR FORCE PARTICIPATION:
- This is BOTH a demand-side effect (disposable income → C → AD) AND a supply-side effect (lower marginal tax rates reduce disincentive to work → more people enter workforce → LFPR increases → AS increases)
- Structure the answer: participation rate FIRST (AS effect), then growth (AD effect), then unemployment
- Common error: students answer in wrong order or skip the participation rate AS-channel entirely
- The participation rate effect: people previously disincentivised by high marginal tax rates (e.g. second income earners, those weighing childcare costs against after-tax income) become more willing to work

MONETARY POLICY / INTEREST RATES: RBA cash rate → commercial bank lending rates → C falls (mortgage holders lose discretionary income) + I falls (business borrowing more expensive) → AD falls → downward pressure on real GDP and GPL. Must show at least TWO AD components affected. Higher rates also attract foreign capital → AUD appreciates → (X-M) may fall.

INFLATION TYPES:
- Demand inflation: AD grows faster than AS → GPL rises (occurs near productive capacity)
- Cost inflation: production costs rise → firms pass on via higher prices → AS falls (can occur at any time)
- Must use AD and AS terminology — never just "demand" caused inflation

GOAL DEFINITIONS (define on FIRST mention only):
- SSEG: highest rate of growth possible, consistent with strong employment growth, without running into inflationary, environmental or external pressures — 3–3.5% real GDP p.a.
- Price Stability: maintaining CPI within 2–3% on average over time (NOT "stability of currency value" in terms of exchange rate — a common student error)
- Full Employment: achieving NAIRU — approximately 4–4.25% unemployment. Note: unemployment currently near or below NAIRU means it is TOO LOW — increases in unemployment toward 4–4.25% would actually HELP achieve both full employment and price stability. This is counterintuitive but important.
- External Stability: sustainable current account deficit and manageable levels of net foreign liabilities

COMMON STUDENT ERRORS TO WATCH FOR AND CORRECT:
1. Confusing financial sector with business sector in circular flow
2. Only showing one side of depreciation effects (just imports or just exports)
3. Defining non-material living standards as "satisfaction from goods" — it is WELLBEING/QUALITY OF LIFE
4. Reversing cause and effect: "AS increases leads to efficient allocation" (wrong — efficiency ENABLES AS increase)
5. Saying "demand/supply" instead of "aggregate demand/aggregate supply"
6. Saying things will happen absolutely ("will") rather than conditionally ("likely to", "should")
7. Not using ceteris paribus in cause-effect chains
8. Missing the target rate when defining macroeconomic goals
9. Saying things are "positive or negative" when they should say "increase or decrease"
10. Describing the business cycle phases instead of AD/AS factors when asked about factors
11. Using "people" instead of aggregate concepts — e.g. say "average incomes" not "people's incomes"
12. Only addressing the short-run AD effect of tax cuts — missing the AS/participation rate channel
13. Infrastructure investment described only as a G injection (AD) without the productive capacity/AS effect
14. Price stability goal confused with "stability of the AUD exchange rate" — completely different concepts

MARKING RULES:
1. Ceteris paribus / "all else remaining equal" required in cause-effect chains (3+ mark questions)
2. Use "likely/should" not "will" — deduct if absent on 3+ mark questions
3. Full goal definitions with target rate required on FIRST mention
4. Both MATERIAL and NON-MATERIAL living standards required where asked — missing one = significant mark loss
5. Purchasing power ≠ disposable income
6. No circular reasoning — assertions without mechanisms score 0 for that point
7. Full sentences — no arrows, symbols, dot points
8. Describe trend = DUDDS (Direction, Units, Data, Dates, So-what)
9. Must identify which AD component is affected (C, I, G, X-M)
10. AS questions must link through to productive capacity
11. For living standards: material = access to goods/services, income, purchasing power; non-material = health, environment, work-life balance, crime, stress, job security, social participation

var SAVE_KEY = "aos2_practice_v2";

function saveState() {
  try {
    var state = {
      sName: sName,
      attempts: attempts,
      confidences: confidences,
      currentLesson: currentLesson,
      currentLevels: currentLevels
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch(e) { /* storage unavailable */ }
}

function loadState() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    var state = JSON.parse(raw);
    if (!state.sName) return false;
    sName = state.sName;
    attempts = state.attempts || {};
    confidences = state.confidences || {};
    currentLesson = state.currentLesson || 0;
    currentLevels = state.currentLevels || {};
    return true;
  } catch(e) { return false; }
}

function clearState() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

  var attempted = Object.keys(attempts).filter(function(k) { return attempts[k] && attempts[k].length > 0; }).length;
  var banner = document.createElement("div");
  banner.style.cssText = "background:var(--green-pale);border:2px solid var(--green-light);border-radius:10px;padding:14px 16px;margin-bottom:20px;text-align:left;";
  banner.innerHTML = "<div style=\"font-size:13px;font-weight:700;color:var(--green);margin-bottom:6px;\">&#128196; Session saved — welcome back, " + sName + "!</div>" +
    "<div style=\"font-size:12px;color:#1a3d2b;\">You have " + attempted + " question" + (attempted !== 1 ? "s" : "") + " completed. Click <strong>Continue</strong> to pick up where you left off, or clear your progress below.</div>" +
    "<div style=\"margin-top:10px;display:flex;gap:8px;\">" +
    "<button onclick=\"resumeSession()\" style=\"padding:7px 18px;background:var(--green);color:white;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;\">Continue &#8594;</button>" +
    "<button onclick=\"clearSession()\" style=\"padding:7px 18px;background:white;color:var(--slate);border:2px solid var(--border);border-radius:7px;font-size:13px;cursor:pointer;font-family:DM Sans,sans-serif;\">Start fresh</button>" +
    "</div>";
  entry.insertBefore(banner, entry.firstChild);
}

function resumeSession() {
  document.getElementById("entry").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("topName").textContent = sName;
  document.getElementById("printTitle").textContent = "VCE Economics — U3 AOS2 Practice";
  document.getElementById("printMeta").textContent = "Student: " + sName + "   |   Date: " + new Date().toLocaleDateString("en-AU", {day:"numeric",month:"long",year:"numeric"});
  buildTabs();
  renderLesson(currentLesson);
}

function clearSession() {
  clearState();
  sName = ""; attempts = {}; confidences = {}; currentLesson = 0; currentLevels = {};
  // Remove banner
  location.reload();
}

function start() {
  var n = document.getElementById("nameInput").value.trim();
  if (!n) { alert("Please enter your name first."); return; }
  sName = n;
  document.getElementById("entry").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("topName").textContent = sName;
  document.getElementById("printTitle").textContent = "VCE Economics — U3 AOS2 Practice";
  document.getElementById("printMeta").textContent = "Student: " + sName + "   |   Date: " + new Date().toLocaleDateString("en-AU", {day:"numeric",month:"long",year:"numeric"});
  buildTabs();
  renderLesson(0);
}

function buildTabs() {
  var html = "";
  for (var i = 0; i < LESSONS.length; i++) {
    var l = LESSONS[i];
    var hasDone = false;
    for (var j = 0; j < l.qs.length; j++) {
      if (attempts[l.qs[j].id] && attempts[l.qs[j].id].length > 0) { hasDone = true; break; }
    }
    var cls = "lesson-tab" + (i === currentLesson ? " active" : "") + (hasDone ? " has-attempt" : "");
    html += "<button class=\"" + cls + "\" id=\"ltab-" + i + "\" onclick=\"renderLesson(" + i + ")\">" + l.id + "</button>";
  }
  document.getElementById("lessonTabs").innerHTML = html;
}

function renderLesson(idx) {
  currentLesson = idx;
  var l = LESSONS[idx];
  if (!currentLevels[l.id]) currentLevels[l.id] = "a";

  var html = "<div class=\"lesson-header\"><div class=\"lnum\">" + l.id + "</div>";
  html += "<h3>" + l.title.replace(/^L\d+ — /,"") + "</h3>";
  html += "<p>" + l.desc + "</p></div>";
  if (l.showData) html += DATA_BOX_HTML;

  // Level tabs
  var qa = l.qs[0];
  var qb = l.qs[1];
  var aAttempted = attempts[qa.id] && attempts[qa.id].length > 0;
  var bAttempted = attempts[qb.id] && attempts[qb.id].length > 0;
  var aActive = currentLevels[l.id] === "a";

  html += "<div class=\"level-tabs\">";
  html += "<button class=\"level-tab" + (aActive ? " active" : "") + (aAttempted ? " attempted" : "") + "\" onclick=\"switchLevel('" + l.id + "','a')\">";
  html += "<span class=\"tab-badge l1\">Level 1</span> " + qa.marks + " marks";
  if (aAttempted) html += " <span style=\"font-size:13px;color:var(--green)\">&#10003;</span>";
  html += "</button>";
  html += "<button class=\"level-tab" + (!aActive ? " active" : "") + (bAttempted ? " attempted" : "") + "\" onclick=\"switchLevel('" + l.id + "','b')\">";
  html += "<span class=\"tab-badge l2\">Level 2</span> " + qb.marks + " marks";
  if (bAttempted) html += " <span style=\"font-size:13px;color:var(--green)\">&#10003;</span>";
  html += "</button>";
  html += "</div>";

  // Level 1 panel
  html += "<div class=\"level-panel" + (aActive ? " active" : "") + "\" id=\"panel-" + l.id + "-a\">";
  html += buildNudge("l1");
  html += buildQPanel(qa, idx);
  html += "</div>";

  // Level 2 panel
  html += "<div class=\"level-panel" + (!aActive ? " active" : "") + "\" id=\"panel-" + l.id + "-b\">";
  html += buildNudge("l2");
  html += buildQPanel(qb, idx);
  html += "</div>";

  document.getElementById("lessonContent").innerHTML = html;
  buildTabs();
  updateProgress();
  saveState();
  window.scrollTo({top:0,behavior:"smooth"});

  // Restore any existing attempt displays
  for (var j = 0; j < l.qs.length; j++) {
    var q = l.qs[j];
    if (attempts[q.id] && attempts[q.id].length > 0) {
      renderAllAttempts(q.id, q.marks);
    }
  }
}

function buildNudge(level) {
  if (level === "l1") {
    return "<div class=\"stretch-nudge l1-nudge\">" +
      "<strong>&#127919; Level 1 — Build your foundation</strong>" +
      "<p>This question tests the core concept. It's a great place to start, but don't stop here — once you've got this, push yourself to attempt Level 2. Exam success comes from being able to handle the harder question.</p>" +
      "</div>";
  } else {
    return "<div class=\"stretch-nudge\">" +
      "<strong>&#128293; Level 2 — Stretch &amp; extend</strong>" +
      "<p>This question applies the concept to real data and asks for deeper analysis. This is the type of question that separates good from excellent responses on the SAC and exam. Give it a go — you might surprise yourself.</p>" +
      "</div>";
  }
}

function buildQPanel(q, lessonIdx) {
  var kkHtml = "";
  for (var k = 0; k < q.kk.length; k++) {
    kkHtml += "<span class=\"kk-tag\">" + KK_MAP[q.kk[k]] + "</span>";
  }
  var wordGuide = Math.round(q.marks * 40);
  var checklistHtml = buildChecklist(q);
  var confHtml = "";
  if (q.marks >= 3) {
    confHtml = "<p class=\"conf-label\">How confident are you? (optional)</p><div class=\"confidence-row\">";
    var opts = ["Not sure","Somewhat confident","Very confident"];
    for (var i = 0; i < opts.length; i++) {
      confHtml += "<button class=\"conf-btn\" id=\"conf-" + q.id + "-" + i + "\" onclick=\"setConf('" + q.id + "'," + i + ")\">" + opts[i] + "</button>";
    }
    confHtml += "</div>";
  }

  var html = "<div class=\"q-meta\">";
  html += "<span class=\"q-marks-badge\">" + q.marks + " marks</span>";
  html += kkHtml + "</div>";
  html += "<div class=\"q-text\">" + q.text + "</div>";
  html += "<div class=\"tips-row\">";
  html += "<button class=\"tip-btn content\" onclick=\"toggleTip('hint-" + q.id + "',this)\">&#128161; Content Tip</button>";
  html += "<button class=\"tip-btn process\" onclick=\"toggleTip('proc-" + q.id + "',this)\">&#128295; Process Guide</button>";
  html += "</div>";
  html += "<div class=\"tip-panel content\" id=\"hint-" + q.id + "\">" + q.hint + "</div>";
  html += "<div class=\"tip-panel process\" id=\"proc-" + q.id + "\">" + q.process + "</div>";
  html += "<div class=\"checklist\"><div class=\"cl-title\">&#9989; Before You Submit</div>" + checklistHtml + "</div>";
  html += confHtml;
  html += "<textarea class=\"q-textarea\" id=\"ta-" + q.id + "\" placeholder=\"Write your answer here in full sentences...\"></textarea>";
  html += "<div class=\"word-hint\">Aim for ~" + wordGuide + " words &nbsp;|&nbsp; Full sentences only &nbsp;|&nbsp; No arrows or bullet points</div>";
  html += "<button class=\"btn-submit\" id=\"btn-" + q.id + "\" onclick=\"submitQ('" + q.id + "'," + lessonIdx + ")\">&#129520; Submit for Marking</button>";
  html += "<div class=\"attempts-container\" id=\"att-" + q.id + "\"></div>";
  return html;
}

function buildChecklist(q) {
  var items = [];
  items.push("I have written in full sentences (no arrows or symbols)");
  items.push("I have used \'likely/should\' not \'will\' in cause-effect analysis");
  if (q.marks >= 3) items.push("I have used \'all else remaining equal\' or \'ceteris paribus\'");
  if (q.text.indexOf("trend") !== -1 || q.text.indexOf("Describe") !== -1) {
    items.push("My trend description uses DUDDS: Direction, Units, Data, Dates, So-what");
  }
  if (q.text.indexOf("living standard") !== -1) {
    items.push("I have addressed BOTH material AND non-material living standards");
  }
  if (q.kk.indexOf("KK5") !== -1 || q.text.indexOf("goal") !== -1 || q.text.indexOf("SSEG") !== -1) {
    items.push("I have defined the goal with its target rate (SSEG 3-3.5% | CPI 2-3% | NAIRU 4-4.25%)");
  }
  if (q.marks >= 4) items.push("I have explained the mechanism, not just stated the outcome");
  if (q.text.indexOf("&bull;") !== -1) items.push("I have addressed ALL dot points with equal depth");
  var html = "";
  for (var i = 0; i < items.length; i++) {
    html += "<label><input type=\"checkbox\"> " + items[i] + "</label>";
  }
  return html;
}

function switchLevel(lessonId, level) {
  currentLevels[lessonId] = level;
  var panels = ["a","b"];
  for (var i = 0; i < panels.length; i++) {
    var p = document.getElementById("panel-" + lessonId + "-" + panels[i]);
    if (p) p.className = "level-panel" + (panels[i] === level ? " active" : "");
  }
  // update level tab styles
  renderLesson(currentLesson);
}

function toggleTip(id, btn) {
  var el = document.getElementById(id);
  if (!el) return;
  if (el.classList.contains("show")) {
    el.classList.remove("show"); btn.classList.remove("open");
  } else {
    el.classList.add("show"); btn.classList.add("open");
  }
}

function setConf(qid, idx) {
  confidences[qid] = idx;
  for (var i = 0; i < 3; i++) {
    var b = document.getElementById("conf-" + qid + "-" + i);
    if (b) b.className = "conf-btn" + (i === idx ? " selected" : "");
  }
}

async function submitQ(qid, lessonIdx) {
  var ta = document.getElementById("ta-" + qid);
  if (!ta || !ta.value.trim()) { alert("Please write your answer before submitting."); return; }
  var answer = ta.value.trim();

  if (!getKey()) { alert("Please enter your API key in the top-right corner before submitting."); if (btn) { btn.disabled = false; btn.textContent = "\u{1F4AC} Submit for Marking"; } return; }

  var q = null;
  for (var i = 0; i < LESSONS.length; i++) {
    for (var j = 0; j < LESSONS[i].qs.length; j++) {
      if (LESSONS[i].qs[j].id === qid) { q = LESSONS[i].qs[j]; break; }
    }
  }
  if (!q) return;

  var btn = document.getElementById("btn-" + qid);
  if (btn) { btn.disabled = true; btn.textContent = "Marking..."; }

  var attDiv = document.getElementById("att-" + qid);
  if (attDiv) {
    var loadDiv = document.createElement("div");
    loadDiv.className = "loading-msg";
    loadDiv.id = "loading-" + qid;
    loadDiv.textContent = "&#129302; Analysing your response...";
    attDiv.appendChild(loadDiv);
  }

  var attemptNum = attempts[qid] ? attempts[qid].length + 1 : 1;
  var prompt = "Question (" + q.marks + " marks): " + q.text.replace(/<[^>]+>/g,"") + "\n\nStudent Answer (Attempt " + attemptNum + "): " + answer;

  try {
    var resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": getKey(),
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM,
        messages: [
          { role: "user", content: prompt + "\n\nRespond ONLY with valid JSON in the specified format. No markdown backticks." }
        ]
      })
    });
    var data = await resp.json();
    if (!resp.ok) {
      var errMsg = data.error ? data.error.message : ("HTTP " + resp.status);
      throw new Error("API error: " + errMsg);
    }
    var raw = data.content && data.content[0] ? data.content[0].text : "{}";
    if (raw.charAt(0) !== "{") { var s = raw.indexOf("{"); if (s !== -1) raw = raw.substring(s); }
    var parsed = JSON.parse(raw);

    if (!attempts[qid]) attempts[qid] = [];
    attempts[qid].push({ answer: answer, score: parsed.score, feedback: parsed });

    var loadEl = document.getElementById("loading-" + qid);
    if (loadEl) loadEl.remove();

    renderAllAttempts(qid, q.marks);
    updateProgress();
    buildTabs();
    saveState();

    if (btn) { btn.style.display = "none"; }
    if (ta) { ta.style.display = "none"; }
    var wh = ta ? ta.nextElementSibling : null;
    if (wh && wh.className === "word-hint") wh.style.display = "none";

  } catch(e) {
    var loadEl2 = document.getElementById("loading-" + qid);
    if (loadEl2) loadEl2.innerHTML = "&#9888;&#65039; Error: " + e.message + " — please screenshot this and tell your teacher.";
    if (btn) { btn.disabled = false; btn.textContent = "Submit for Marking"; }
    console.error("Marking error:", e);
  }
}

function renderAllAttempts(qid, maxScore) {
  var attDiv = document.getElementById("att-" + qid);
  if (!attDiv || !attempts[qid]) return;
  var html = "";
  var list = attempts[qid];

  for (var i = 0; i < list.length; i++) {
    var a = list[i];
    var pct = maxScore > 0 ? a.score / maxScore : 0;
    var scCls = pct >= 0.75 ? "high" : (pct >= 0.5 ? "mid" : "low");
    var isLast = i === list.length - 1;
    var attId = qid + "-" + i;

    html += "<div class=\"attempt-block\">";
    html += "<div class=\"attempt-header\">";
    html += "<span class=\"attempt-num\">Attempt " + (i+1) + "</span>";
    html += "<span class=\"attempt-score " + scCls + "\">" + a.score + "/" + maxScore + " — " + scoreLabel(pct) + "</span>";
    html += "</div>";
    html += "<div class=\"attempt-answer\">" + escHtml(a.answer) + "</div>";

    // Feedback
    var fb = a.feedback;
    html += "<div class=\"attempt-feedback\">";
    if (fb.encouragement) html += "<div class=\"fb-encouragement\">" + fb.encouragement + "</div>";
    if (fb.whatWorked && fb.whatWorked.length) {
      html += "<div class=\"fb-section\"><h5 class=\"good\">&#9989; What You Did Well</h5><ul>";
      for (var w = 0; w < fb.whatWorked.length; w++) html += "<li>" + fb.whatWorked[w] + "</li>";
      html += "</ul></div>";
    }
    if (fb.improvements && fb.improvements.length) {
      html += "<div class=\"fb-section\"><h5 class=\"improve\">&#128295; What To Improve</h5><ul>";
      for (var im = 0; im < fb.improvements.length; im++) html += "<li>" + fb.improvements[im] + "</li>";
      html += "</ul></div>";
    }
    if (fb.commonMistakes && fb.commonMistakes.length && fb.commonMistakes[0]) {
      html += "<div class=\"fb-section\"><h5 class=\"mistake\">&#9888;&#65039; Common Mistake Found</h5><ul>";
      for (var cm = 0; cm < fb.commonMistakes.length; cm++) {
        if (fb.commonMistakes[cm]) html += "<li>" + fb.commonMistakes[cm] + "</li>";
      }
      html += "</ul></div>";
    }
    html += "<button class=\"model-reveal-btn\" onclick=\"toggleModel('" + attId + "')\">&#128196; Show / Hide Model Answer</button>";
    html += "<div class=\"model-answer\" id=\"model-" + attId + "\">" + (fb.modelAnswer || "") + "</div>";
    html += "</div>";

    // Retry only on last attempt if score < max
    if (isLast && a.score < maxScore) {
      html += "<div class=\"retry-section\">";
      html += "<p>&#128260; Reflection before retry — what specific step will you add or improve?</p>";
      html += "<textarea id=\"reflect-" + qid + "\" placeholder=\"e.g. I forgot ceteris paribus and didn't define the goal with the target rate...\"></textarea>";
      html += "<button class=\"retry-btn\" onclick=\"retryQ('" + qid + "')\">&#128260; Retry This Question</button>";
      html += "</div>";
    }

    html += "</div>";
  }
  attDiv.innerHTML = html;
}

function toggleModel(attId) {
  var el = document.getElementById("model-" + attId);
  if (el) el.classList.toggle("show");
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function retryQ(qid) {
  var reflect = document.getElementById("reflect-" + qid);
  if (!reflect || !reflect.value.trim()) {
    alert("Please write your reflection first before retrying.");
    return;
  }
  // Show textarea and submit button again
  var ta = document.getElementById("ta-" + qid);
  var btn = document.getElementById("btn-" + qid);
  saveState();
  if (ta) { ta.value = ""; ta.style.display = "block"; }
  if (btn) { btn.style.display = "inline-block"; btn.disabled = false; btn.textContent = "&#129520; Submit Retry"; }
  var wh = ta ? ta.nextElementSibling : null;
  if (wh && wh.className === "word-hint") wh.style.display = "block";
  // Remove retry section from display until new submit
  renderAllAttempts(qid, getMaxScore(qid));
}

function getMaxScore(qid) {
  for (var i = 0; i < LESSONS.length; i++) {
    for (var j = 0; j < LESSONS[i].qs.length; j++) {
      if (LESSONS[i].qs[j].id === qid) return LESSONS[i].qs[j].marks;
    }
  }
  return 0;
}

function scoreLabel(pct) {
  if (pct >= 0.9) return "Excellent";
  if (pct >= 0.75) return "Strong";
  if (pct >= 0.5) return "Good start";
  if (pct >= 0.25) return "Partial";
  return "Developing";
}

function updateProgress() {
  var total = 0; var done = 0;
  for (var i = 0; i < LESSONS.length; i++) {
    for (var j = 0; j < LESSONS[i].qs.length; j++) {
      total++;
      var qid = LESSONS[i].qs[j].id;
      if (attempts[qid] && attempts[qid].length > 0) done++;
    }
  }
  var bar = document.getElementById("progressBar");
  if (bar) bar.style.width = (total > 0 ? Math.round((done/total)*100) : 0) + "%";
}

function showResults() {
  document.getElementById("main").style.display = "none";
  document.getElementById("results").style.display = "block";
  buildResults();
}

function backToQuestions() {
  document.getElementById("results").style.display = "none";
  document.getElementById("main").style.display = "block";
}

function buildResults() {
  document.getElementById("resultsName").textContent = sName;
  var totalE = 0; var totalP = 0;
  var kkE = {}; var kkP = {};
  for (var i = 0; i < LESSONS.length; i++) {
    for (var j = 0; j < LESSONS[i].qs.length; j++) {
      var q = LESSONS[i].qs[j];
      totalP += q.marks;
      for (var k = 0; k < q.kk.length; k++) {
        kkP[q.kk[k]] = (kkP[q.kk[k]] || 0) + q.marks;
      }
      if (attempts[q.id] && attempts[q.id].length > 0) {
        var best = 0;
        for (var a = 0; a < attempts[q.id].length; a++) {
          if (attempts[q.id][a].score > best) best = attempts[q.id][a].score;
        }
        totalE += best;
        for (var k2 = 0; k2 < q.kk.length; k2++) {
          kkE[q.kk[k2]] = (kkE[q.kk[k2]] || 0) + best;
        }
      }
    }
  }
  var pct = totalP > 0 ? Math.round((totalE/totalP)*100) : 0;
  document.getElementById("totalScore").textContent = totalE + "/" + totalP;
  document.getElementById("totalLabel").textContent = pct + "% (best attempts)";
  var html = "";
  for (var kk in kkP) {
    var s = kkE[kk] || 0; var m = kkP[kk];
    var kpct = m > 0 ? Math.round((s/m)*100) : 0;
    html += "<div class=\"results-kk-card\"><h4>" + kk + "</h4><p>" + KK_MAP[kk] + "</p><div class=\"kk-score\">" + s + "/" + m + " (" + kpct + "%)</div></div>";
  }
  document.getElementById("kkGrid").innerHTML = html;
}

  body += "ul{padding-left:16px;margin:4px 0;} li{margin-bottom:3px;}";
  body += ".page-break{page-break-before:always;}";
  body += "</style></head><body>";
  body += "<h1>VCE Economics — Unit 3 AOS2 Practice</h1>";
  body += "<div class=\"meta\">Student: <b>" + sName + "</b> &nbsp;|&nbsp; Date: " + d + "</div>";

  for (var i = 0; i < LESSONS.length; i++) {
    var l = LESSONS[i];
    var lessonHasAttempt = false;
    for (var j = 0; j < l.qs.length; j++) {

      var q = l.qs[j];
      if (!attempts[q.id] || attempts[q.id].length === 0) continue;
      body += "<h3>" + (j === 0 ? "Level 1" : "Level 2") + " (" + q.marks + " marks)</h3>";
      body += "<div class=\"q-text\">" + q.text.replace(/<br>/g,"\n").replace(/<[^>]+>/g,"") + "</div>";
      for (var a = 0; a < attempts[q.id].length; a++) {
        var att = attempts[q.id][a];
        var pct = q.marks > 0 ? att.score / q.marks : 0;
        var scCls = pct >= 0.75 ? "score-hi" : (pct >= 0.5 ? "score-mid" : "score-lo");
        body += "<div class=\"attempt\">";
        body += "<div class=\"att-head\"><span>Attempt " + (a+1) + "</span><span class=\"" + scCls + "\">" + att.score + "/" + q.marks + " — " + scoreLabel(pct) + "</span></div>";
        body += "<div class=\"att-answer\">" + att.answer.replace(/</g,"&lt;").replace(/>/g,"&gt;") + "</div>";
        body += "</div>";
      }
    }
  }
  body += "</body></html>";
  printWin.document.write(body);
  printWin.document.close();
  printWin.print();
}
</script>
</body>
</html>
